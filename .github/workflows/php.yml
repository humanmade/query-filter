name: PHP Code Quality

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    # Only run when PHP or the coding standards configuration change.
    paths:
      - '**.php'
      - '.phpcs.xml'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.2'
          coverage: none
          tools: cs2pr

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --no-ansi

      - name: Run PHPCS
        id: phpcs
        run: composer phpcs -- --report-full --report-checkstyle=phpcs-report.xml

      - name: Annotate PR with PHPCS results
        if: ${{ always() && steps.phpcs.outcome == 'failure' }}
        run: cs2pr ./phpcs-report.xml
